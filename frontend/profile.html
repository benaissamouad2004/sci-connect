<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — SciConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WMGPGZJ7"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

  <!-- Banner teal with avatar -->
  <div class="prf-banner">
    <svg class="prf-banner-deco" viewBox="0 0 960 160" fill="none"><circle cx="800" cy="-30" r="150" fill="white" fill-opacity="0.05"/><circle cx="150" cy="180" r="100" fill="white" fill-opacity="0.04"/><circle cx="500" cy="60" r="70" fill="white" fill-opacity="0.04"/></svg>
    <a href="dashboard.html" class="prf-back-btn" title="Retour au dashboard">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 2L4 8l6 6"/></svg>
    </a>
    <div class="prf-banner-actions">
      <button class="prf-share-btn" onclick="shareProfile()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10.5" cy="2.5" r="1.5"/><circle cx="10.5" cy="10.5" r="1.5"/><circle cx="2.5" cy="6.5" r="1.5"/><path d="M4 7l5 3M4 6l5-3"/></svg>
        Partager
      </button>
    </div>
    <div class="prf-avatar-wrap">
      <div class="prf-avatar" id="prf-avatar"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="prf-page">

    <!-- Identity section -->
    <div class="prf-identity">
      <div class="prf-identity-left">
        <div class="prf-badges-row" id="prf-badges-row"></div>
        <h1 class="prf-name" id="prf-name">Chargement...</h1>
        <div class="prf-details" id="prf-details"></div>
        <p class="prf-bio" id="prf-bio"></p>
        <p class="prf-since" id="prf-since"></p>
      </div>
      <div class="prf-identity-right" id="prf-badge-level">
        <!-- Badge level icon injected here -->
      </div>
    </div>

    <!-- Stats band -->
    <div class="prf-stats-band" id="prf-stats-band">
      <div class="prf-stat-item">
        <span class="prf-stat-val" id="prf-stat-responses">—</span>
        <span class="prf-stat-label">réponses données</span>
      </div>
      <div class="prf-stat-item">
        <span class="prf-stat-val" id="prf-stat-forms">—</span>
        <span class="prf-stat-label">questionnaires déposés</span>
      </div>
      <div class="prf-stat-item">
        <span class="prf-stat-val prf-stat-accent" id="prf-stat-completion">—</span>
        <span class="prf-stat-label">taux de complétion</span>
      </div>
      <div class="prf-stat-item">
        <span class="prf-stat-val" id="prf-stat-rank">—</span>
        <span class="prf-stat-label" id="prf-stat-rank-label">classement</span>
      </div>
    </div>

    <!-- Two-column layout -->
    <div class="prf-two-col">

      <!-- LEFT column -->
      <div class="prf-col-left">

        <!-- Portfolio de recherche -->
        <section class="prf-card" id="prf-portfolio-section">
          <div class="prf-card-title">Portfolio de recherche</div>
          <div class="prf-card-subtitle">Questionnaires déposés sur SciConnect</div>
          <div class="prf-portfolio-list" id="prf-portfolio-list"></div>
        </section>

        <!-- Bio edit (visible only for own profile) -->
        <section class="prf-card" id="prf-bio-edit-section" style="display:none">
          <div class="prf-card-title">Ma bio</div>
          <textarea class="prf-bio-textarea" id="prf-bio-input" maxlength="500" rows="4" placeholder="Parle de toi, tes recherches, tes centres d'intérêt..."></textarea>
          <button class="prf-bio-save" id="prf-bio-save">Enregistrer</button>
        </section>

        <!-- Identité académique -->
        <section class="prf-card" id="prf-identity-card">
          <div class="prf-card-title">Identité académique</div>
          <div class="prf-id-rows" id="prf-id-rows">
            <!-- Injected by JS -->
          </div>
          <p class="prf-id-note">Informations vérifiées via email institutionnel</p>
        </section>

      </div>

      <!-- RIGHT column -->
      <div class="prf-col-right">

        <!-- Badges obtenus -->
        <section class="prf-card">
          <div class="prf-card-title">Badges obtenus</div>
          <div class="prf-badges-grid" id="prf-badges-grid"></div>
        </section>

        <!-- Contribution -->
        <section class="prf-card" id="prf-contribution-card">
          <div class="prf-card-title">Contribution</div>
          <div id="prf-contribution-bars"></div>
        </section>

        <!-- Classement -->
        <section class="prf-card prf-classement-card">
          <div class="prf-card-title">Classement</div>
          <div class="prf-rank-main">
            <span class="prf-rank-num" id="prf-rank-num">—</span>
            <div>
              <div class="prf-rank-sub" id="prf-rank-sub"></div>
              <div class="prf-rank-top" id="prf-rank-top"></div>
            </div>
          </div>
          <div class="prf-rank-rows" id="prf-rank-rows"></div>
        </section>

      </div>

    </div>

  </div><!-- /prf-page -->

  <!-- Loader overlay -->
  <div class="prf-loader" id="prf-loader">
    <div class="prf-spinner"></div>
    <span>Chargement du profil...</span>
  </div>

  <script src="js/main.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
